<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>maciek@dev — offline</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="boot">
  <div class="boot-logo">◈ SYSTEM OFFLINE...</div>
  <div class="boot-bar-wrap"><div class="boot-bar"></div></div>
  <div class="boot-txt">loading maintenance mode</div>
</div>

<canvas id="particles"></canvas>

<div class="crt-scanlines"></div>
<div class="crt-vignette"></div>
<div class="crt-flicker"></div>

<div class="window">
  <div class="titlebar">
    <div class="dot dot-r"></div>
    <div class="dot dot-y"></div>
    <div class="dot dot-g"></div>
    <span class="titlebar-label">maciek@dev — system_offline</span>
  </div>

  <div class="term-body" id="term"></div>

  <div class="statusbar">
    <div class="sb"><div class="sb-dot" style="background: #f87171; box-shadow: 0 0 6px #f87171;"></div><span>zsh 5.9</span><span class="sb-pill" style="color: #f87171; border-color: #f87171;">● offline</span></div>
    <div class="sb"><span id="sb-time"></span><span>UTF-8</span><span>PL</span></div>
  </div>
</div>

<script src="js/particles.js"></script>
<script src="js/terminal.js"></script>
<script src="js/home.js"></script>
<script src="js/main.js"></script>
</body>
</html>
